<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0a0a0a"/>
  
  <!-- Subtle grain texture via noise pattern -->
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8521a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Glow center -->
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Ladder rungs — the core symbol -->
  <!-- Left rail -->
  <line x1="172" y1="148" x2="172" y2="364" stroke="#e8521a" stroke-width="18" stroke-linecap="round" opacity="0.9"/>
  <!-- Right rail -->
  <line x1="340" y1="148" x2="340" y2="364" stroke="#e8521a" stroke-width="18" stroke-linecap="round" opacity="0.9"/>

  <!-- Rungs — bottom to top, getting brighter = progress -->
  <line x1="172" y1="348" x2="340" y2="348" stroke="#e8521a" stroke-width="14" stroke-linecap="round" opacity="0.25"/>
  <line x1="172" y1="294" x2="340" y2="294" stroke="#e8521a" stroke-width="14" stroke-linecap="round" opacity="0.45"/>
  <line x1="172" y1="240" x2="340" y2="240" stroke="#e8521a" stroke-width="14" stroke-linecap="round" opacity="0.65"/>
  <line x1="172" y1="186" x2="340" y2="186" stroke="#e8521a" stroke-width="14" stroke-linecap="round" opacity="1"/>

  <!-- Small upward arrow at top rung to imply motion -->
  <polyline points="256,148 256,110" stroke="#e8521a" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
  <polyline points="232,132 256,108 280,132" stroke="#e8521a" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>

  <!-- Subtle border -->
  <rect width="512" height="512" rx="112" fill="none" stroke="#e8521a" stroke-width="6" opacity="0.08"/>
</svg>
